<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <title>Jarvis</title>
</head>
<body>
    <nav class="chats">
        <h3>Chat History</h3>
        <ul>
            <li class="chat">How to start Web development?</li>
            <li class="chat">What's a Nebula?</li>
            <li class="chat">Resources for Javascript</li>
        </ul>
    </nav>

    <main>
        <section class="input_section">
            <input type="text" placeholder="What's on your mind?" name="question" class="question">
        </section>
        <section class="actions">
            <button class="add_icon">+</button>
            <button class="submit_icon">Submit</button>
        </section>
    </main>
    
</body>
</html>
